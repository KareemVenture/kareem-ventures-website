<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Indonesia's first integrated platform enabling SMEs to structure social giving through Islamic Waqf contracts." />
    <meta name="theme-color" content="#020617" />
    <title>Kareem Ventures | The Operating System for Islamic Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"></noscript>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              slate: {
                850: '#151e2e',
                900: '#0f172a',
                950: '#020617', // Main background
              },
              kareem: {
                teal: '#10b981', // Neon Emerald
                dark: '#020617',
                gold: '#fbbf24',
                accent: '#34d399', 
                sand: '#f8f9fa',
              }
            },
            boxShadow: {
              'glow': '0 0 40px -10px rgba(16, 185, 129, 0.3)',
              'glow-gold': '0 0 40px -10px rgba(251, 191, 36, 0.2)',
            },
            animation: {
              'blob': 'blob 20s infinite',
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'marquee': 'marquee 30s linear infinite',
              'spotlight': 'spotlight 2s ease .75s 1 forwards',
              'gradient-x': 'gradient-x 15s ease infinite',
              'aurora': 'aurora 60s linear infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'beam': 'beam 3s linear infinite',
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'hero-glow': 'conic-gradient(from 180deg at 50% 50%, #020617 0deg, #10b981 180deg, #020617 360deg)',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-100%)' },
              },
              'gradient-x': {
                '0%, 100%': {
                    'background-size': '200% 200%',
                    'background-position': 'left center'
                },
                '50%': {
                    'background-size': '200% 200%',
                    'background-position': 'right center'
                },
              },
              aurora: {
                from: {
                  backgroundPosition: '50% 50%, 50% 50%'
                },
                to: {
                  backgroundPosition: '350% 50%, 350% 50%'
                }
              },
              shimmer: {
                from: {
                  backgroundPosition: '0 0'
                },
                to: {
                  backgroundPosition: '-200% 0'
                }
              },
              beam: {
                 '0%': { transform: 'translateX(-100%)' },
                 '100%': { transform: 'translateX(100%)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      
      /* Modern Grid Background */
      .bg-grid-white {
        background-size: 50px 50px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        mask-image: radial-gradient(ellipse at center, black 40%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 70%);
      }
      
      .dark .bg-grid-white {
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      }

      html:not(.dark) .bg-grid-white {
         background-image: linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
      }

      /* Dot Pattern */
      .bg-dot-pattern {
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .dark .bg-dot-pattern {
        background-image: radial-gradient(#334155 1px, transparent 1px);
      }

      /* Glass Card - Adaptive */
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(226, 232, 240, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      
      .dark .glass-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-card:hover {
        background: rgba(255, 255, 255, 0.95);
        border-color: rgba(16, 185, 129, 0.3);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
      }

      .dark .glass-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(16, 185, 129, 0.3);
        box-shadow: 0 0 30px -10px rgba(16, 185, 129, 0.2);
      }
      
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      .text-gradient {
        background: linear-gradient(to right, #1e293b, #64748b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .dark .text-gradient {
        background: linear-gradient(to right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .text-gradient-emerald {
        background: linear-gradient(to right, #059669, #10b981);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .dark .text-gradient-emerald {
        background: linear-gradient(to right, #34d399, #10b981);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@0.292.0",
    "react/": "https://esm.sh/react@18.3.1/",
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "framer-motion": "https://esm.sh/framer-motion@11.0.8"
  }
}
</script>
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white transition-colors duration-500 overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-700 dark:selection:text-emerald-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
